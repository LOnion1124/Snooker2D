name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          cache: true

      - name: Build
        run: |
          cmake -B build -G "Ninja" -DCMAKE_BUILD_TYPE=Release
          cmake --build build

      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          ./build/test_mathutils.exe
          ./build/test_physics.exe
          ./build/test_gamestate.exe
          ./build/test_ball.exe
          ./build/test_player.exe
          ./build/test_rules.exe
          ./build/test_viewmodel.exe
          ./build/test_englishcontrolpanel.exe
          ./build/test_gamecontrolpanel.exe
          ./build/test_gameview.exe

      - name: Architecture check
        run: ./tests/architecture/check_mvvm_boundaries.ps1
